name: Playwright Tests
on:
  workflow_call:
    inputs:
      base_url:
        type: string
        description: The base URL to test
        required: true
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Cache playwright
        uses: actions/cache@v3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Set up environment variables
        run: echo "BASE_URL=${{ inputs.base_url }}" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: npm ci
      # Always run install --with-deps: restores OS packages (apt) even when browser
      # binaries are cached; skipping this step caused "browser has been closed" on CI.
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
