[build]
  command = "npm install && npm run build"
  functions = "functions"
  publish = "build"
[[headers]]
  # Applica queste regole a tutte le pagine e risorse del sito
  for = "/*"
  
  [headers.values]
    # 1. Content Security Policy (CSP)
    # script-src: Vite dev (netlify dev) injects inline React Refresh — needs 'unsafe-inline'.
    # Production build uses external module scripts; unsafe-inline is a tradeoff for local dev on :8888.
    # connect-src: ws/wss for Vite HMR when using netlify dev (proxy to :5173).
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.themoviedb.org ws://localhost:5173 ws://127.0.0.1:5173 ws://localhost:8888 ws://127.0.0.1:8888; img-src 'self' data: https://image.tmdb.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com; worker-src 'self';"
    
    # 2. Protezione da Clickjacking (Equivalente a frameguard: 'deny')
    X-Frame-Options = "DENY"
    
    # 3. Protezione da MIME-Sniffing (Equivalente a noSniff: true)
    X-Content-Type-Options = "nosniff"
    
    # 4. Protezione XSS per browser datati (Equivalente a xssFilter: true)
    X-XSS-Protection = "1; mode=block"
    
    # 5. Controllo dispersione dati (Equivalente a strict-origin-when-cross-origin)
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # 6. HTTP Strict Transport Security (HSTS) - Forzatura HTTPS per 1 anno
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # 7. Permissions Policy (Blindatura Hardware totale)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), bluetooth=(), webauthn=()"